name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: ZIP Dosyasını Sorunsuz Çıkar
        run: |
          # -o parametresi sunucunun soru sormasını engeller, direkt üzerine yazar
          if [ -f *"Bahşiş"*.zip ] || [ -f *.zip ]; then
            unzip -o *.zip
            rm *.zip
          fi

      - name: İmza Dosyasını (Keystore) Hazırla
        run: |
          # Eğer içeriden base64 kodlu imza dosyası çıktıysa onu çözüyoruz
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ -f "app/debug.keystore.base64" ]; then
            base64 -d app/debug.keystore.base64 > debug.keystore
          else
            # Yoksa sıfırdan standart bir tane üretiyoruz ki hata vermesin
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Gradle Wrapper Kur ve APK Oluştur
        run: |
          # Dosyalar artık ana dizinde olduğu için direkt wrapper kuruyoruz
          gradle wrapper
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
